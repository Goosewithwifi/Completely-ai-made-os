name: Build DiggaOS ISO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        # Added mtools (required for grub-mkrescue)
        sudo apt-get install -y xorriso grub-pc-bin grub-common cpio gzip mtools

    - name: Build DiggaOS
      run: |
        set -x
        
        # 1. Clean and Prepare
        rm -rf iso initramfs
        mkdir -p iso/boot/grub
        mkdir -p initramfs/bin initramfs/dev initramfs/proc initramfs/sys initramfs/sbin initramfs/etc

        # 2. Grab Static BusyBox
        wget -O initramfs/bin/busybox https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox
        chmod +x initramfs/bin/busybox

        # 3. Create Init Script
        cat << 'EOF' > initramfs/init
        #!/bin/busybox sh
        /bin/busybox --install -s /bin
        mount -t proc none /proc
        mount -t sysfs none /sys
        clear
        echo "=========================================================="
        echo " DiggaOS v1.0 [SHELL ONLY]"
        echo "=========================================================="
        while true; do /bin/sh; done
        EOF
        chmod +x initramfs/init

        # 4. Pack Initramfs
        cd initramfs
        find . -print0 | cpio --null -ov --format=newc | gzip -9 > ../iso/boot/initrd.img
        cd ..

        # 5. Kernel Copy (Using a broad search ignoring errors)
        # Using 2>/dev/null to hide 'Permission denied' noise
        KERNEL_FILE=$(find /boot -name "vmlinuz*" -type f 2>/dev/null | head -n 1)
        sudo cp "$KERNEL_FILE" iso/boot/vmlinuz
        sudo chmod 644 iso/boot/vmlinuz

        # 6. Configure GRUB
        cat << 'EOF' > iso/boot/grub/grub.cfg
        set default=0
        set timeout=1
        menuentry "DiggaOS" {
            linux /boot/vmlinuz nomodeset text vga=normal console=tty1
            initrd /boot/initrd.img
        }
        EOF

        # 7. Finalize ISO
        # We explicitly don't use FAT/mtools if it fails by just using xorriso directly
        xorriso -as mkisofs -o diggaos.iso -isohybrid-mbr /usr/lib/grub/i386-pc/boot_hybrid.img -c boot/grub/i386-pc/boot.cat -b boot/grub/i386-pc/eltorito.img -no-emul-boot -boot-load-size 4 -boot-info-table iso

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-final-iso
        path: diggaos.iso
