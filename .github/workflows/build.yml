name: Build DiggaOS with APT
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin grub-common cpio gzip mtools kmod xz-utils

    - name: Build DiggaOS with APT
      run: |
        set -e
        rm -rf iso initramfs
        mkdir -p iso/boot/grub
        mkdir -p initramfs/bin initramfs/dev initramfs/proc initramfs/sys initramfs/sbin initramfs/etc initramfs/lib/modules initramfs/var/cache/apt/archives initramfs/var/lib/apt/lists initramfs/var/lib/dpkg initramfs/usr/bin initramfs/usr/lib

        echo "== Downloading BusyBox =="
        wget -q -O initramfs/bin/busybox https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox
        test -s initramfs/bin/busybox || { echo "FATAL: busybox download failed or is empty"; exit 1; }
        chmod +x initramfs/bin/busybox
        ./initramfs/bin/busybox --install -s ./initramfs/bin

        echo "== Extracting APT (best-effort, non-fatal) =="
        mkdir -p /tmp/apt-extract
        (
          cd /tmp/apt-extract
          wget -q http://mirrors.kernel.org/ubuntu/pool/main/a/apt/apt_2.7.14ubuntu1_amd64.deb -O apt.deb || true
          if [ -s apt.deb ]; then
            ar x apt.deb || true
            if [ -f data.tar.xz ]; then
              tar -xf data.tar.xz || true
            fi
          fi
        )
        # Copy whatever we got, using an explicit absolute path — no globs, no guessing
        for bin in apt apt-get apt-cache; do
          if [ -f "/tmp/apt-extract/usr/bin/$bin" ]; then
            cp "/tmp/apt-extract/usr/bin/$bin" "$GITHUB_WORKSPACE/initramfs/bin/$bin"
            chmod +x "$GITHUB_WORKSPACE/initramfs/bin/$bin"
            echo "  -> installed $bin"
          else
            echo "  -> $bin not available (skipping, non-fatal)"
          fi
        done
        if [ -f initramfs/bin/apt-get ] && [ ! -f initramfs/bin/apt ]; then
          ln -s apt-get initramfs/bin/apt
        fi

        echo "== Copying kernel and modules =="
        KERNEL_VERSION=$(uname -r)
        test -f /boot/vmlinuz-$KERNEL_VERSION || { echo "FATAL: kernel image not found at /boot/vmlinuz-$KERNEL_VERSION"; exit 1; }
        sudo cp /boot/vmlinuz-$KERNEL_VERSION ./vmlinuz_temp
        mv ./vmlinuz_temp iso/boot/vmlinuz
        sudo chmod 644 iso/boot/vmlinuz

        test -d /lib/modules/$KERNEL_VERSION || { echo "FATAL: kernel modules dir not found at /lib/modules/$KERNEL_VERSION"; exit 1; }
        sudo cp -r /lib/modules/$KERNEL_VERSION initramfs/lib/modules/
        sudo chown -R $(id -u):$(id -g) initramfs

        echo "== Creating init script =="
        printf '%s\n' \
          '#!/bin/sh' \
          'export PATH=/bin:/sbin:/usr/bin:/usr/sbin' \
          'export HOME=/root' \
          'export TERM=linux' \
          'export DEBIAN_FRONTEND=noninteractive' \
          '' \
          'mount -t proc none /proc' \
          'mount -t sysfs none /sys' \
          'mount -t devtmpfs none /dev' \
          '' \
          'for m in $(find /lib/modules -name "*.ko" 2>/dev/null); do' \
          '  insmod "$m" 2>/dev/null || true' \
          'done' \
          '' \
          'sleep 1' \
          '' \
          'IFACE=$(ls /sys/class/net 2>/dev/null | grep -v lo | head -1)' \
          'if [ -n "$IFACE" ]; then' \
          '  ifconfig "$IFACE" up 2>/dev/null || true' \
          'fi' \
          '' \
          'mkdir -p /var/lib/apt/lists /var/cache/apt/archives /var/lib/dpkg' \
          'touch /var/lib/dpkg/status 2>/dev/null || true' \
          '' \
          'clear' \
          'echo "  ____  _                      ____   ____  "' \
          'echo " |  _ \\(_) __ _  __ _  __ _   / __ \\ / ___| "' \
          'echo " | | | | |/ _\` |/ _\` |/ _\` | | |  | |\\___ \\ "' \
          'echo " | |_| | | (_| | (_| | (_| | | |__| | ___) |"' \
          'echo " |____/|_|\\__, |\\__, |\\__,_|  \\____/ |____/ "' \
          'echo "          |___/ |___/                       "' \
          'echo ""' \
          'echo "DiggaOS v1.3 - With APT Package Manager"' \
          'echo ""' \
          'echo "Commands:"' \
          'echo "  apt install <package>     Install packages"' \
          'echo "  apt remove <package>      Remove packages"' \
          'echo "  apt update                Update package lists"' \
          'echo "  wget <url>                Download files"' \
          'echo "  ifconfig / ping           Network tools"' \
          'echo ""' \
          'echo "Example: apt install curl"' \
          'echo ""' \
          '' \
          'exec /bin/sh' \
          > initramfs/init
        chmod +x initramfs/init
        test -s initramfs/init || { echo "FATAL: init script is empty"; exit 1; }

        echo "== Verifying initramfs contents before packing =="
        echo "Contents of initramfs/:"
        find initramfs -maxdepth 2
        test -x initramfs/bin/busybox || { echo "FATAL: busybox missing from initramfs before packing"; exit 1; }
        test -x initramfs/init || { echo "FATAL: /init missing or not executable before packing"; exit 1; }
        du -sh initramfs

        echo "== Packing initramfs =="
        (
          cd initramfs
          find . -print0 | cpio --null -ov --format=newc | xz -9 > ../iso/boot/initrd.img
        )
        test -s iso/boot/initrd.img || { echo "FATAL: initrd.img is empty after packing"; exit 1; }
        echo "initrd.img size:"
        ls -lh iso/boot/initrd.img

        echo "== Sanity check: can we read back the cpio archive? =="
        xz -dc iso/boot/initrd.img | cpio -t 2>&1 | head -20
        echo "(^ should list files like ./init, ./bin/busybox, etc. If empty, the pack failed.)"

        echo "== Creating GRUB config =="
        printf '%s\n' \
          'set timeout=1' \
          'insmod part_iso9660' \
          'insmod iso9660' \
          'menuentry "DiggaOS v1.3 with APT" {' \
          '    linux /boot/vmlinuz root=/dev/ram0 rw nomodeset init=/init' \
          '    initrd /boot/initrd.img' \
          '}' \
          > iso/boot/grub/grub.cfg

        echo "== Building ISO =="
        grub-mkrescue -o diggaos-apt.iso iso
        ls -lh diggaos-apt.iso

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-apt
        path: diggaos-apt.iso
