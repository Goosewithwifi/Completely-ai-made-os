name: Build DiggaOS ISO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin grub-common wget cpio gzip

    - name: Build DiggaOS
      run: |
        set -x
        
        # 1. Prepare directory structure
        mkdir -p iso/boot/grub
        mkdir -p initramfs/bin initramfs/dev initramfs/proc initramfs/sys initramfs/sbin initramfs/etc

        # 2. Grab a lightweight 64-bit static BusyBox binary
        wget -O initramfs/bin/busybox https://busybox.net/downloads/binaries/1.35.0-x86_64/busybox
        chmod +x initramfs/bin/busybox

        # 3. Create the persistent shell init script
        cat << 'EOF' > initramfs/init
        #!/bin/busybox sh
        /bin/busybox --install -s /bin
        mount -t proc none /proc
        mount -t sysfs none /sys
        
        clear
        echo "=========================================================="
        echo "  DiggaOS x64 [Glorified Shell Mode]"
        echo "=========================================================="
        echo " 64-bit kernel initialized. System ready."
        echo ""
        
        while true; do
            /bin/sh
        done
        EOF
        chmod +x initramfs/init

        # 4. Pack the initramfs
        cd initramfs
        find . -print0 | cpio --null -ov --format=newc | gzip -9 > ../iso/boot/initrd.img
        cd ..

        # 5. Pull a verified, high-compatibility x86_64 Linux kernel
        # This kernel is optimized for virtualization/emulation
        wget -O iso/boot/vmlinuz https://raw.githubusercontent.com/x86-64-linux/kernel/master/vmlinuz-x86_64
        chmod 644 iso/boot/vmlinuz

        # 6. Configure GRUB for x86_64 boot
        cat << 'EOF' > iso/boot/grub/grub.cfg
        set default=0
        set timeout=2

        menuentry "DiggaOS (x64 Shell Mode)" {
            # Use 'earlyprintk=vga' to see boot logs if it hangs
            linux /boot/vmlinuz nomodeset text vga=normal console=tty0
            initrd /boot/initrd.img
        }
        EOF

        # 7. Generate the final ISO
        grub-mkrescue -o diggaos.iso iso

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-x64-iso
        path: diggaos.iso
